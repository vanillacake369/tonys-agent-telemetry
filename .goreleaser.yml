version: 2

project_name: tonys-agent-telemetry

builds:
  - id: main
    main: .
    binary: tonys-agent-telemetry
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    ids: [main]
    formats: [tar.gz]
    name_template: "tonys-agent-telemetry_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: "checksums.txt"

# Linux package targets (deb + rpm + apk). Distributors who want to
# pull via apt/dnf/apk can grab these from each GitHub release.
nfpms:
  - id: linux-packages
    ids: [main]
    package_name: tonys-agent-telemetry
    vendor: vanillacake369
    homepage: https://github.com/vanillacake369/tonys-agent-telemetry
    maintainer: vanillacake369 <vanillacake369@users.noreply.github.com>
    description: |-
      Local-first control plane for LLM agents.
      Multi-provider telemetry TUI with Swarm DAG visualization,
      evidence-backed skill recommendations, and longitudinal trends.
    license: MIT
    formats: [deb, rpm, apk]
    bindir: /usr/bin
    contents:
      - src: README.md
        dst: /usr/share/doc/tonys-agent-telemetry/README.md
      - src: LICENSE
        dst: /usr/share/doc/tonys-agent-telemetry/LICENSE
        file_info:
          mode: 0644

# Homebrew formula — published to a separate tap repo on each release.
# Requires the tap repo to exist: vanillacake369/homebrew-tap. Disabled
# automatically on snapshot builds via the {{ if not .IsSnapshot }}.
brews:
  - name: tonys-agent-telemetry
    ids: [default]
    repository:
      owner: vanillacake369
      name: homebrew-tap
      branch: main
      # External-repo push requires a PAT with `repo` scope on the tap
      # repo — the default GITHUB_TOKEN cannot write outside this repo.
      # If HOMEBREW_TAP_TOKEN is unset, skip_upload turns true
      # via the template below and goreleaser only produces the formula
      # file locally (dist/homebrew/Formula/...) so a maintainer can
      # copy it over manually.
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    description: "Local-first multi-provider LLM agent telemetry TUI"
    homepage: "https://github.com/vanillacake369/tonys-agent-telemetry"
    license: "MIT"
    skip_upload: '{{ if eq .Env.HOMEBREW_TAP_TOKEN "" }}true{{ end }}'
    test: |
      system "#{bin}/tonys-agent-telemetry", "--version"
    install: |
      bin.install "tonys-agent-telemetry"

# SBOMs for supply-chain transparency. Anchore syft is the default.
sboms:
  - id: archive
    artifacts: archive

# Cosign keyless signing (sigstore/Fulcio via the GH Actions OIDC token).
# Each archive, deb/rpm/apk package, checksums file, and SBOM is signed,
# producing a .sig (signature) + .pem (cert) sidecar attached to the
# release. Verify post-download with:
#
#   cosign verify-blob \
#     --certificate tonys-agent-telemetry_linux_amd64.tar.gz.pem \
#     --signature   tonys-agent-telemetry_linux_amd64.tar.gz.sig \
#     --certificate-identity-regexp '^https://github\.com/vanillacake369/tonys-agent-telemetry/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     tonys-agent-telemetry_linux_amd64.tar.gz
signs:
  - id: cosign-keyless
    cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
    signature: ${artifact}.sig
    certificate: ${artifact}.pem
    artifacts: all
    output: true

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^feat[(:]"
      order: 0
    - title: Bug fixes
      regexp: "^fix[(:]"
      order: 1
    - title: Refactors
      regexp: "^refactor[(:]"
      order: 2

release:
  github:
    owner: vanillacake369
    name: tonys-agent-telemetry
  prerelease: auto
  mode: replace
  draft: false
