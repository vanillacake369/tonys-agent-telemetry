name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::Unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      # Strict lint runs only on changed code (--new-from-rev=origin/main)
      # so accumulated pre-existing issues do not block CI. Pre-fetch the
      # main ref so the diff comparison is meaningful on shallow checkouts.
      - name: Fetch origin/main for lint baseline
        run: git fetch --no-tags --depth=50 origin main
      - name: golangci-lint (new-only)
        uses: golangci/golangci-lint-action@v6
        with:
          # Pin to a v2 binary explicitly — the action's "latest" still
          # serves v1 by default, and v1 cannot parse our .golangci.yml
          # (which uses the v2 schema).
          version: v2.12.2
          args: --timeout 5m --new-from-rev=origin/main

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Test (race)
        run: go test -race -count=1 ./...
      - name: Coverage
        run: |
          go test -race -count=1 -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.sha }}" -o bin/tonys-agent-telemetry-${{ matrix.goos }}-${{ matrix.goarch }} .
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
