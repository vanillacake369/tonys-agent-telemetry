name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger so docs-only commits (or any ref update applied via
  # gh api PATCH, which seems to skip the push event) can still be
  # verified against the full matrix via `gh workflow run ci.yml`.
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::Unformatted files:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      # Strict lint runs only on changed code (--new-from-rev=origin/main)
      # so accumulated pre-existing issues do not block CI. Pre-fetch the
      # main ref so the diff comparison is meaningful on shallow checkouts.
      - name: Fetch origin/main for lint baseline
        run: git fetch --no-tags --depth=50 origin main
      - name: golangci-lint (new-only)
        # v7 of the action is required to install golangci-lint v2 binaries
        # (v6 only knows about v1 release tags and explicitly rejects v2.x).
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout 5m --new-from-rev=origin/main

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Test (race)
        run: go test -race -count=1 ./...
      - name: Coverage
        run: |
          go test -race -count=1 -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.sha }}" -o bin/tonys-agent-telemetry-${{ matrix.goos }}-${{ matrix.goarch }} .
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
