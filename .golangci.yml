version: "2"

# golangci-lint v2 config — used by the pre-commit hook (when installed)
# and by the CI lint job. Keep aligned with the project's house rules:
# SRP/DRY/SSoT/Micro-Module + TDD. Linters are picked to ENFORCE those
# without being noisy.

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck         # unhandled errors
    - govet            # the usual
    - ineffassign      # ineffective assignments
    - staticcheck      # staticcheck suite (replaces megacheck + gosimple)
    - unused           # unused identifiers
    - misspell         # misspelled English in comments/identifiers
    - gocyclo          # cyclomatic complexity
    - gosec            # security checks (basic)
    - prealloc         # slice preallocation hints

  settings:
    gocyclo:
      min-complexity: 25  # generous; tab Update methods reasonably reach ~20
    misspell:
      locale: US
    govet:
      enable:
        - shadow
    gosec:
      excludes:
        - G104  # ignored errors; errcheck handles it more precisely
        - G304  # file path traversal; we read user-provided paths intentionally
        - G306  # WriteFile perm; we choose 0600/0644 intentionally per file

  exclusions:
    rules:
      # Test files allow more leniency.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - gocyclo
      # PIVOT_PLAN / SIGNALS_SPEC / MEMORY references in docstrings should
      # not be flagged by misspell.
      - source: "SIGNALS_SPEC|PIVOT_PLAN|MEMORY"
        linters:
          - misspell

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
